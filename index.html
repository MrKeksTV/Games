<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff1493,#ff5ca8);
    padding:20px;
    position:relative;
    overflow:hidden;
}

/* 💥 Weiß Overlay */
#white-overlay{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
    transition:opacity 10s linear;
    z-index:999;
}

#white-overlay.active{
    opacity:1;
}

.wrapper{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:2;
}

.app{
    width:320px;
    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

h2{
    color:#ff2e63;
    margin-bottom:20px;
    font-size:32px;
}

input,
button{
    width:100%;
    padding:15px;
    margin-top:12px;
    border-radius:14px;
    border:1px solid #ddd;
    font-size:16px;
}

button{
    background:#ff2e63;
    color:white;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

#result-box{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:#fff0f5;
}

#result-percent{
    font-size:55px;
    font-weight:bold;
    color:#ff2e63;
    margin-top:10px;
}

#result-text{
    margin-top:10px;
    font-size:18px;
    color:#333;
}

#admin-panel{
    display:none;
    margin-top:20px;
    padding:15px;
    border-radius:15px;
    background:#f5f5f5;
}

#secret-area{
    display:none;
    width:320px;
    margin-top:15px;
}
</style>
</head>

<body>

<!-- 💥 Overlay -->
<div id="white-overlay"></div>

<div class="wrapper">

    <div class="app">

        <h2>💖 Love Calculator</h2>

        <input id="name1" placeholder="Name 1">
        <input id="name2" placeholder="Name 2">

        <button id="calc-button">Berechnen</button>

        <div id="result-box">
            <div id="result-names"></div>
            <div id="result-percent"></div>
            <div id="result-text"></div>
        </div>

        <div id="admin-panel">

            <h3>🔒 Cheat Menü</h3>

            <input id="fake-name1" placeholder="Name 1">
            <input id="fake-name2" placeholder="Name 2">
            <input id="fake-prozent" placeholder="Prozent">

            <button id="save-cheat">Speichern</button>

        </div>

    </div>

    <div id="secret-area">
        <input id="secret-input" placeholder="🔐 Passwort eingeben">
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

    const ADMIN_PASSWORD = "Passwort123";

    const btn = document.getElementById("calc-button");
    const adminPanel = document.getElementById("admin-panel");
    const secretArea = document.getElementById("secret-area");
    const secretInput = document.getElementById("secret-input");
    const overlay = document.getElementById("white-overlay");

    let cheats = [];

    const texts = [
        "💖 Perfektes Match!",
        "🔥 Mega Chemie!",
        "😍 Wahre Liebe!",
        "😅 Schwierig...",
        "💔 Keine gute Kombi",
        "✨ Schicksal!"
    ];

    // 💖 Berechnen
    btn.addEventListener("click",()=>{

        const n1 = document.getElementById("name1")
        .value.trim().toLowerCase();

        const n2 = document.getElementById("name2")
        .value.trim().toLowerCase();

        // 🔒 Cheat Trigger
        if(n1==="cheat" && n2==="menü"){

            if(adminPanel.style.display!=="block"){
                secretArea.style.display="block";
            }

            return;
        }

        let percent = Math.floor(Math.random()*101);

        cheats.forEach(c=>{

            if(
                (c.n1===n1 && c.n2===n2) ||
                (c.n1===n2 && c.n2===n1)
            ){
                percent = c.p;
            }

        });

        document.getElementById("result-box")
        .style.display="block";

        document.getElementById("result-names")
        .innerText = n1 + " ❤️ " + n2;

        document.getElementById("result-percent")
        .innerText = percent + "%";

        // 💥 Über 100
        if(percent >= 100){

            document.getElementById("result-text")
            .innerText = "💦Wann liegt ihr zusammen im Bett🛌?";

            setTimeout(()=>{
                overlay.classList.add("active");
            },500);

        }else{

            overlay.classList.remove("active");

            document.getElementById("result-text")
            .innerText =
            texts[Math.floor(Math.random()*texts.length)];

        }

    });

    // 🔐 Passwort
    secretInput.addEventListener("keydown",(e)=>{

        if(e.key==="Enter"){

            if(secretInput.value===ADMIN_PASSWORD){

                adminPanel.style.display="block";

                secretArea.style.display="none";

                alert("✔ Cheat Menü geöffnet");

            }else{
                alert("❌ Falsches Passwort");
            }

            secretInput.value="";
        }

    });

    // 💾 Cheat speichern
    document.getElementById("save-cheat")
    .addEventListener("click",()=>{

        const n1 = document.getElementById("fake-name1")
        .value.trim().toLowerCase();

        const n2 = document.getElementById("fake-name2")
        .value.trim().toLowerCase();

        const p = parseInt(
            document.getElementById("fake-prozent").value
        );

        if(!n1 || !n2 || isNaN(p)){
            alert("Bitte alles ausfüllen");
            return;
        }

        cheats.push({n1,n2,p});

        alert("✔ Gespeichert");

    });

});
</script>

</body>
</html>
