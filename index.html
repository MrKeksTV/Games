<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Status Monitor</title>
    <style>
        body {
            background-color: #0d0202; /* Sehr dunkles Rot/Schwarz */
            color: #ff3333; /* Roter Text für Warn-Ästhetik */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .monitor-panel {
            width: 100%;
            max-width: 600px;
            background-color: #1a0505;
            border: 2px solid #ff1111;
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            border-radius: 4px;
        }

        .panel-header {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            border-bottom: 2px solid #ff1111;
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .data-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255, 51, 51, 0.3);
            padding-bottom: 4px;
        }

        .label {
            color: #ff6666;
        }

        /* Sanfter, kontrollierter Puls-Effekt für Status-Anzeigen */
        .status-pulse {
            color: #ff1111;
            font-weight: bold;
            animation: pulse-animation 2s infinite ease-in-out;
        }

        @keyframes pulse-animation {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="monitor-panel">
        <div class="panel-header">
            Systemüberwachung / Diagnose
        </div>
        
        <div class="data-container">
            <div class="data-row">
                <span class="label">Protokoll-Typ:</span>
                <span>Abgesichert (HTTPS)</span>
            </div>
            <div class="data-row">
                <span class="label">Netzwerk-Status:</span>
                <span class="status-pulse">ONLINE ●</span>
            </div>
            <div class="data-row">
                <span class="label">Systemzeit:</span>
                <span id="live-time">--:--:--</span>
            </div>
            <div class="data-row">
                <span class="label">Eintrag 1:</span>
                <span>Louis Kronsfoth</span>
            </div>
            <div class="data-row">
                <span class="label">Eintrag 2:</span>
                <span>Bövinghausen</span>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('live-time').innerText = now.toLocaleTimeString();
        }
        // Aktualisiert die Uhrzeit sekündlich
        setInterval(updateTime, 1000);
        window.onload = updateTime;
    </script>

</body>
</html>
