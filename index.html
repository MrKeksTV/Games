<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systemfehler</title>
    <style>
        body {
            background-color: #008080; /* Klassisches Retro-Blau/Grün */
            font-family: "Courier New", Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Das Fehlerfenster im klassischen PC-Stil */
        .error-window {
            background-color: #c0c0c0;
            border: 3px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            width: 400px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .close-btn {
            background-color: #c0c0c0;
            border: 1px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            width: 16px;
            height: 14px;
            font-size: 10px;
            text-align: center;
            line-height: 12px;
            cursor: pointer;
            color: black;
        }

        .window-body {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .error-icon {
            background-color: red;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            font-size: 30px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-text {
            color: black;
            font-size: 14px;
        }

        .button-row {
            text-align: center;
            padding-bottom: 15px;
        }

        .ok-btn {
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 6px 25px;
            font-size: 14px;
            cursor: pointer;
        }

        .ok-btn:active {
            border-color: #808080 #ffffff #ffffff #808080;
        }
    </style>
</head>
<body>

    <div class="error-window" id="errorBox">
        <div class="title-bar">
            <span>System Error</span>
            <div class="close-btn" onclick="closeWindow()">X</div>
        </div>
        <div class="window-body">
            <div class="error-icon">X</div>
            <div class="error-text">
                Fehlercode: 0x80070005<br>
                Die Aktion konnte nicht ausgeführt werden.
            </div>
        </div>
        <div class="button-row">
            <button class="ok-btn" onclick="closeWindow()">OK</button>
        </div>
    </div>

    <script>
        // Funktion zum Abspielen eines synthetischen Pieptons
        function playBeep() {
            // Erstellt einen Web-Audio-Kontext
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; // Sinuswelle für einen klaren Ton
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Tiefer Fehlerton (150 Hz)
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Lautstärke reduzieren
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            // Ton stoppt nach 0.3 Sekunden
            oscillator.stop(audioCtx.currentTime + 0.3); 
        }

        function closeWindow() {
            playBeep();
            // Blendet das Fenster aus, anstatt den Browser zu blockieren
            document.getElementById('errorBox').style.display = 'none';
        }
    </script>

</body>
</html>
