<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Calculator</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial;
    background:#ff1493;
}

.wrapper{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.app{
    width:320px;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

input, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    box-sizing:border-box;
}

button{
    background:#ff2e63;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border:none;
}

#result-box{
    display:none;
    margin-top:15px;
}

#result-percent{
    font-size:40px;
    font-weight:bold;
    color:#ff2e63;
}

#admin-panel{
    display:none;
    margin-top:15px;
    padding:15px;
    background:#f2f2f2;
    border-radius:12px;
}

/* 🔐 Passwortfeld */
#secret-area{
    display:none;
    width:320px;
    margin-top:12px;
}

#secret-input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
</style>

</head>

<body>

<div class="wrapper">

    <div class="app">

        <h2>💖 Love Calculator</h2>

        <input id="name1" placeholder="Name 1">
        <input id="name2" placeholder="Name 2">

        <button id="calc-button">Berechnen</button>

        <div id="result-box">
            <div id="result-names"></div>
            <div id="result-percent"></div>
            <div id="result-text"></div>
        </div>

        <!-- Cheat Menü -->
        <div id="admin-panel">
            <b>Cheat Menü</b>

            <input id="fake-name1" placeholder="Name 1">
            <input id="fake-name2" placeholder="Name 2">
            <input id="fake-prozent" placeholder="Prozent">

            <button id="save-cheat">Speichern</button>
        </div>

    </div>

    <!-- 🔐 Passwortfeld -->
    <div id="secret-area">
        <input id="secret-input" placeholder="🔒 Passwort eingeben...">
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const ADMIN_PASSWORD = "Passwort123";

    const btn = document.getElementById("calc-button");
    const adminPanel = document.getElementById("admin-panel");
    const secretArea = document.getElementById("secret-area");
    const secretInput = document.getElementById("secret-input");

    let cheats = [];

    const texts = [
        "💖 Perfektes Match!",
        "🔥 Mega Chemie!",
        "😅 Eher schwierig...",
        "💔 Keine gute Kombi",
        "😍 Schicksal!",
        "🤔 Freundschafts-Vibes"
    ];

    // 💖 Berechnen
    btn.addEventListener("click", () => {

        const n1 = document.getElementById("name1").value.trim().toLowerCase();
        const n2 = document.getElementById("name2").value.trim().toLowerCase();

        // 🔥 Trigger
        if (n1 === "cheat" && n2 === "menü") {

            // 💥 WICHTIG: Menü offen → Passwortfeld IMMER aus
            secretArea.style.display = "none";

            if (adminPanel.style.display !== "block") {
                secretArea.style.display = "block";
            }

            return;
        }

        let percent = Math.floor(Math.random() * 101);

        cheats.forEach(c => {
            if (
                (c.n1 === n1 && c.n2 === n2) ||
                (c.n1 === n2 && c.n2 === n1)
            ) {
                percent = c.p;
            }
        });

        document.getElementById("result-box").style.display = "block";
        document.getElementById("result-names").innerText = n1 + " ❤️ " + n2;
        document.getElementById("result-percent").innerText = percent + "%";

        document.getElementById("result-text").innerText =
            percent >= 100 ? "Wann liegt ihr zusammen im Bett?"
            : texts[Math.floor(Math.random() * texts.length)];
    });

    // 🔐 Passwort
    document.addEventListener("keydown", (e) => {

        if (e.key === "Enter" && secretArea.style.display === "block") {

            if (secretInput.value === ADMIN_PASSWORD) {

                adminPanel.style.display = "block";

                // 💥 IMMER verstecken wenn Menü offen ist
                secretArea.style.display = "none";

                alert("✔ Cheat Menü geöffnet");

            } else {
                alert("❌ Falsch");
            }

            secretInput.value = "";
        }

    });

    // 💾 Cheat speichern
    document.getElementById("save-cheat").addEventListener("click", () => {

        const n1 = document.getElementById("fake-name1").value.trim().toLowerCase();
        const n2 = document.getElementById("fake-name2").value.trim().toLowerCase();
        const p = parseInt(document.getElementById("fake-prozent").value);

        if (!n1 || !n2 || isNaN(p)) {
            alert("Bitte alles ausfüllen!");
            return;
        }

        cheats.push({ n1, n2, p });

        alert("✔ Gespeichert");

    });

});
</script>

</body>
</html>
