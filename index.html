<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Informationsanzeige</title>
    <style>
        /* Füllt den gesamten Bildschirm aus und entfernt Scrollbalken */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .info-panel {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #aaaaaa;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>System-Status</h1>
        <p>Inhalte werden geladen...</p>
    </div>

</body>
</html>
