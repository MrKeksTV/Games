<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZielGames Klon - MiniGames & Casino</title>
    <style>
        :root {
            --bg-dark: #1a1c20;
            --bg-card: #24272c;
            --accent-green: #00e676;
            --accent-red: #ff3d00;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .balance-box {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            color: var(--accent-green);
            border: 1px solid rgba(0, 230, 118, 0.2);
        }

        .main-container {
            max-width: 1200px;
            margin: 30px auto;
        }

        .section-title {
            font-size: 24px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-green);
            padding-left: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #3b424a;
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .btn {
            background-color: var(--accent-green);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-muted);
        }

        .mines-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .mine-tile {
            background: #334155;
            height: 60px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
        }

        .input-field {
            background: #1e293b;
            border: 1px solid #475569;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            width: 80%;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h2>ZielGames <span style="color:var(--accent-green)">Klon</span></h2>
        <div class="balance-box">Coins: <span id="balance">50000</span> 🪙</div>
    </header>

    <div class="main-container">
        <h3 class="section-title">Casino Games</h3>
        <div class="grid-container">

            <!-- Mines -->
            <div class="game-card" onclick="openGame('mines')">
                <div class="game-icon">💣</div>
                <h3>Mines</h3>
                <p style="color: var(--text-muted)">Finde Diamanten. Vermeide das TNT!</p>
                <button class="btn">Jetzt spielen</button>
            </div>

            <!-- Crash -->
            <div class="game-card" onclick="openGame('crash')">
                <div class="game-icon">📈</div>
                <h3>Crash</h3>
                <p style="color: var(--text-muted)">Zahle aus, bevor der Multiplikator abstürzt!</p>
                <button class="btn">Jetzt spielen</button>
            </div>

            <!-- Coinflip -->
            <div class="game-card" onclick="openGame('coinflip')">
                <div class="game-icon">🪙</div>
                <h3>Coinflip</h3>
                <p style="color: var(--text-muted)">50/50 Münzwurf — Kopf oder Zahl?</p>
                <button class="btn">Jetzt spielen</button>
            </div>

        </div>
    </div>

    <!-- MINES WINDOW -->
    <div id="modal-mines" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h3>Mines (3x3 Feld)</h3>
            <input type="number" id="mines-bet" class="input-field" value="1000" placeholder="Einsatz">
            <div class="mines-grid">
                <div class="mine-tile" onclick="playMine(0)" id="tile-0">?</div>
                <div class="mine-tile" onclick="playMine(1)" id="tile-1">?</div>
                <div class="mine-tile" onclick="playMine(2)" id="tile-2">?</div>
                <div class="mine-tile" onclick="playMine(3)" id="tile-3">?</div>
                <div class="mine-tile" onclick="playMine(4)" id="tile-4">?</div>
                <div class="mine-tile" onclick="playMine(5)" id="tile-5">?</div>
                <div class="mine-tile" onclick="playMine(6)" id="tile-6">?</div>
                <div class="mine-tile" onclick="playMine(7)" id="tile-7">?</div>
                <div class="mine-tile" onclick="playMine(8)" id="tile-8">?</div>
            </div>
            <button class="btn" style="background: var(--accent-red); color: white;" onclick="resetMines()">Spiel zurücksetzen</button>
        </div>
    </div>

    <!-- CRASH WINDOW -->
    <div id="modal-crash" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h3>Crash</h3>
            <input type="number" id="crash-bet" class="input-field" value="1000">
            <h1 id="crash-multiplier" style="font-size: 48px; color: var(--accent-green)">1.00x</h1>
            <button id="crash-btn" class="btn" onclick="startCrash()">Start</button>
        </div>
    </div>

    <!-- COINFLIP WINDOW -->
    <div id="modal-coinflip" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h3>Coinflip</h3>
            <input type="number" id="coinflip-bet" class="input-field" value="1000"><br>
            <button class="btn" onclick="playCoinflip('Kopf')">Kopf</button>
            <button class="btn" style="background:#64748b;" onclick="playCoinflip('Zahl')">Zahl</button>
            <h2 id="coinflip-result" style="margin-top:20px;"></h2>
        </div>
    </div>

    <!-- Hier wird die Logik-Datei verknüpft -->
    <script src="script.js"></script>
</body>
</html>
