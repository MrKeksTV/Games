<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Brawl Stars Meta Picker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🔥 Brawl Stars Meta Picker</h1>

    <div class="panel">
      <label for="mapSelect">Map auswählen:</label>
      <select id="mapSelect"></select>
    </div>

    <div class="results">
      <h2>💡 Empfohlene Brawler</h2>
      <ul id="brawlerList"></ul>
    </div>

    <div class="meta">
      <h3>📊 Live Meta Patch</h3>
      <div id="metaInfo"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
