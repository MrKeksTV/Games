<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Konsole</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            overflow: hidden;
        }

        .terminal {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #005500;
            background-color: #0a0a0a;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .header {
            border-bottom: 1px solid #005500;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Blinkender Cursor-Effekt */
        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00ff00;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { background-color: transparent; }
        }

        .log-line {
            margin: 8px 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .status-ok {
            color: #00ff00;
        }

        .status-info {
            color: #00aaff;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <div class="header">
            [SYSTEM DIAGNOSE KONSOLE V1.0.4]
        </div>
        
        <div class="log-line">--- ANALYSE GESTARTET ---</div>
        <div class="log-line">Protokoll: <span class="status-info">HTTPS/WebSocket</span></div>
        <div class="log-line">Verbindungsstatus: <span class="status-ok">AKTIV</span></div>
        <div class="log-line">Lokale Systemzeit: <span id="time-field" class="status-info">--:--:--</span></div>
        <div class="log-line">Bildschirmauflösung: <span id="res-field" class="status-info">unbekannt</span></div>
        <div class="log-line">Eingabeaufforderung: root# <span class="cursor">&nbsp;</span></div>
    </div>

    <script>
        function updateDashboard() {
            // Zeigt die aktuelle Uhrzeit des Geräts an
            const jetzt = new Date();
            document.getElementById('time-field').innerText = jetzt.toLocaleTimeString();
            
            // Zeigt die Bildschirmgröße an
            const breite = window.screen.width;
            const hoehe = window.screen.height;
            document.getElementById('res-field').innerText = breite + "x" + hoehe + " Pixel";
        }

        // Aktualisiert die Daten jede Sekunde
        setInterval(updateDashboard, 1000);
        window.onload = updateDashboard;
    </script>

</body>
</html>
